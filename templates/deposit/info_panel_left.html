{# Rendered into #info-panel-left after /pricing-session-add. Mirrors chat_partial.html's left panel children. #}
<div id="session-buttons">
	<div class="session-top-row">
		<button class="btn btn-primary" id="session-new" value="-1">
			<svg xmlns="http://www.w3.org/2000/svg" class="icon icon-sm me-1" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
				<path stroke="none" d="M0 0h24v24H0z" fill="none"/>
				<path d="M12 5l0 14"/><path d="M5 12l14 0"/>
			</svg>
			Yeni Fiyatlama
		</button>
		<button id="info-panel-left-toggle" title="Paneli daralt" type="button">
			<svg xmlns="http://www.w3.org/2000/svg" class="icon" width="22" height="22" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
				<path stroke="none" d="M0 0h24v24H0z" fill="none"/>
				<path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z"/>
				<path d="M9 4v16"/>
				<path d="M15 10l-2 2l2 2"/>
			</svg>
		</button>
	</div>

	<div class="session-header">Oturumlarım</div>

	<div id="session-list">
	{% for label in lbl %}
		{% if label.enabled %}
		<button class="session-switch btn btn-outline-secondary text-start text-truncate {{ 'confirmed' if label.confirmed == True else '' }}"
		        value="{{ loop.index0 }}"
		        title="{{ label.text }}">
			{% if label.confirmed %}
				<svg xmlns="http://www.w3.org/2000/svg" class="icon icon-sm me-1 text-green" width="16" height="16" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
					<path stroke="none" d="M0 0h24v24H0z" fill="none"/>
					<path d="M5 12l5 5l10 -10"/>
				</svg>
			{% else %}
				<svg xmlns="http://www.w3.org/2000/svg" class="icon icon-sm me-1 text-muted" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
					<path stroke="none" d="M0 0h24v24H0z" fill="none"/>
					<circle cx="12" cy="12" r="9"/>
				</svg>
			{% endif %}
			{{ label.text }}
		</button>
		{% endif %}
	{% endfor %}
	</div>

	<button class="btn btn-outline-primary" id="session-deposit-returns" value="-1" style="margin-top:12px;">
		<svg xmlns="http://www.w3.org/2000/svg" class="icon icon-sm me-1" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
			<path stroke="none" d="M0 0h24v24H0z" fill="none"/>
			<path d="M9 14l-4 -4l4 -4"/><path d="M5 10h11a4 4 0 1 1 0 8h-1"/>
		</svg>
		Dönüş Listesi
	</button>
</div>
<button id="info-panel-left-toggle-collapsed" title="Paneli aç" type="button">
	<svg xmlns="http://www.w3.org/2000/svg" class="icon" width="22" height="22" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
		<path stroke="none" d="M0 0h24v24H0z" fill="none"/>
		<path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z"/>
		<path d="M9 4v16"/>
		<path d="M14 10l2 2l-2 2"/>
	</svg>
</button>
