table: LOANS_HIST
schema: HIST
description: |
  Kredi tarihsel arşivi — LOANS_DAILY'nin ay sonu kondanse halinde
  5 yıllık tarihçesi. NPL trend analizi, segment migrasyonu vb.
partition_column: SNAPSHOT_MONTH

columns:
  SNAPSHOT_MONTH:
    type: DATE
    description: "Ay sonu snapshot"
    filterable: true
    filter_role: time_axis
    suggested_variable: as_of_month
    suggested_semantic_tag: as_of_time

  BRANCH_CODE:
    type: VARCHAR2(10)
    description: "Şube"
    filterable: true
    filter_role: dimension
    suggested_variable: branch_codes
    suggested_semantic_tag: branch
    lookup:
      table: DIM_BRANCH
      key: BRANCH_CODE
      display: BRANCH_NAME

  PRODUCT_CODE:
    type: VARCHAR2(10)
    description: "Ürün kodu"
    filterable: true
    filter_role: dimension
    suggested_variable: products
    suggested_semantic_tag: product_group

  SEGMENT:
    type: VARCHAR2(20)
    description: "Müşteri segmenti"
    filterable: true
    filter_role: dimension
    suggested_variable: segments
    suggested_semantic_tag: segment

  MATURITY_BUCKET:
    type: VARCHAR2(8)
    description: "Vade dilimi"
    filterable: true
    filter_role: dimension
    suggested_variable: maturities
    suggested_semantic_tag: maturity

  BALANCE_TRY:
    type: NUMBER(18,2)
    description: "TL eşdeğeri bakiye"
    filterable: false
    aggregatable: true
