table: FX_HIST
schema: HIST
description: |
  Günlük FX kuru tarihçesi — 10 yıllık seri. ECB referans + TCMB
  resmi kur. Tarihi karşılaştırma raporları için zaman serisi.
partition_column: DATE

columns:
  DATE:
    type: DATE
    description: "Tarih"
    filterable: true
    filter_role: time_axis
    suggested_variable: as_of_date
    suggested_semantic_tag: as_of_time

  CCY_PAIR:
    type: CHAR(7)
    description: "Döviz çifti (örn. USD_TRY)"
    filterable: true
    filter_role: dimension
    suggested_variable: ccy_pairs
    suggested_semantic_tag: currency
    distinct_values_sample: [USD_TRY, EUR_TRY, GBP_TRY, CHF_TRY, JPY_TRY]
    distinct_values_sampled_at: 2026-05-21T03:00:00Z

  RATE_OFFICIAL:
    type: NUMBER(10,4)
    description: "TCMB efektif satış"
    filterable: false
    aggregatable: true

  RATE_MARKET:
    type: NUMBER(10,4)
    description: "Piyasa orta"
    filterable: false
    aggregatable: true
