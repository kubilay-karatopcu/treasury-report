table: GAP_ANALYSIS
schema: ALM
description: |
  Aktif-pasif vade gap raporu — para birimi × vade dilimi matrisi.
  ALM komitesinin haftalık ana çıktısı.
partition_column: AS_OF_DATE

columns:
  AS_OF_DATE:
    type: DATE
    description: "Rapor tarihi"
    filterable: true
    filter_role: time_axis
    suggested_variable: as_of_date
    suggested_semantic_tag: as_of_time

  CURRENCY:
    type: CHAR(3)
    description: "Para birimi"
    filterable: true
    filter_role: dimension
    suggested_variable: currencies
    suggested_semantic_tag: currency

  TENOR:
    type: VARCHAR2(6)
    description: "Vade dilimi"
    filterable: true
    filter_role: dimension
    suggested_variable: tenors
    suggested_semantic_tag: tenor_bucket

  ASSETS:
    type: NUMBER(18,2)
    description: "Aktif tutarı"
    filterable: false
    aggregatable: true

  LIABILITIES:
    type: NUMBER(18,2)
    description: "Pasif tutarı"
    filterable: false
    aggregatable: true

  GAP:
    type: NUMBER(18,2)
    description: "Net gap (assets - liabilities)"
    filterable: false
    aggregatable: true
