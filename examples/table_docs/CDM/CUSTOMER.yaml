table: CUSTOMER
schema: CDM
description: |
  Ortak veri modeli müşteri kaydı — Retail, SME, Corporate müşterilerin
  konsolide ana bilgi sayfası. Diğer CDM tabloları FK ile bağlanır.

columns:
  CUSTOMER_ID:
    type: VARCHAR2(20)
    description: "Müşteri kimliği"
    filterable: true
    filter_role: dimension

  SEGMENT:
    type: VARCHAR2(20)
    description: "Segment"
    filterable: true
    filter_role: dimension
    suggested_variable: segments
    suggested_semantic_tag: segment

  COUNTRY:
    type: CHAR(2)
    description: "Müşteri ülkesi"
    filterable: true
    filter_role: dimension
    suggested_variable: countries
    suggested_semantic_tag: region

  RATING_BUCKET:
    type: VARCHAR2(6)
    description: "İç kredi notu"
    filterable: true
    filter_role: dimension
    suggested_variable: ratings
    suggested_semantic_tag: rating_bucket
    lookup:
      table: DIM_RATING
      key: RATING_BUCKET
      display: SP_LABEL

  ONBOARDED_AT:
    type: DATE
    description: "Müşteri kayıt tarihi"
    filterable: true
    filter_role: time_axis
    suggested_variable: onboarded_at
    suggested_semantic_tag: as_of_time
