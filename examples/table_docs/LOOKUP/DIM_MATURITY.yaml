table: DIM_MATURITY
schema: LOOKUP
description: |
  Vade dilimi boyutu — ON / 1W / 1M / 3M / 6M / 1Y / 3Y / 5Y+ etiketleri,
  gün karşılığı, sıralama anahtarı.

columns:
  MATURITY_BUCKET:
    type: VARCHAR2(8)
    description: "Vade etiketi"
    filterable: true
    filter_role: dimension
    suggested_variable: maturities
    suggested_semantic_tag: maturity

  DAYS_MIN:
    type: NUMBER(5)
    description: "Aralık alt sınır (gün)"
    filterable: false

  DAYS_MAX:
    type: NUMBER(5)
    description: "Aralık üst sınır (gün)"
    filterable: false

  SORT_ORDER:
    type: NUMBER(3)
    description: "Sıralama anahtarı"
    filterable: false
