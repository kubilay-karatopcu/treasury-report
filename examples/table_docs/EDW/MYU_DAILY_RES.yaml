table: MYU_DAILY_RES
schema: EDW
description: |
  Mevduat faiz rezervasyon (MYU) günlük ekstraktı. Şube kullanıcısının
  girdiği rezervasyon talepleri, fiyatlama (talep/teklif oranları), müşteri
  demografisi ve piyasa referans oranı tek satırda birleşir. Bir satır =
  bir rezervasyon revizyonu. Lokal geliştirmede mock veri
  examples/generate_myu_daily_res.py ile üretilir.
partition_column: CREATE_DT
estimated_daily_rows: 3000

columns:
  RES_ID:
    type: NUMBER(19)
    description: "Rezervasyon kimliği (birincil anahtar)"
    filterable: true
    filter_role: dimension
    suggested_variable: res_id
    suggested_semantic_tag: deal_id

  TALEP_REVIZE_NO:
    type: NUMBER(4)
    description: "Talep revizyon sırası (1 = ilk giriş)"
    filterable: false

  RESERVATION_NO:
    type: NUMBER(10)
    description: "Kullanıcıya görünen rezervasyon numarası"
    filterable: false

  CREATE_DT:
    type: DATE
    description: "Rezervasyon giriş tarihi (partisyon kolonu)"
    filterable: true
    filter_role: time_axis
    suggested_variable: create_date
    suggested_semantic_tag: as_of_time

  CREATE_TM:
    type: NUMBER(6)
    description: "Giriş saati, HHMMSS tamsayı (84411 = 08:44:11)"
    filterable: false

  RESERVATION_ID_RCL:
    type: NUMBER(19)
    description: "RCL tablosundaki rezervasyon referansı (RES_ID ile aynı)"
    filterable: false
    visible_in_ui: false

  CUST_ID:
    type: NUMBER(12)
    description: "Müşteri numarası"
    filterable: false

  CCY_CODE:
    type: VARCHAR2(3)
    description: "Rezervasyon para birimi"
    filterable: true
