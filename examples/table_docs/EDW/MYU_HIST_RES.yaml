table: MYU_HIST_RES
schema: EDW
description: |
  Mevduat faiz rezervasyon (MYU) tarihsel ekstraktı. MYU_DAILY_RES'in
  geriye dönük birikimli hali; ek olarak MBF fiyatlama bloğunu
  (MBF_LOG_DT..MBF_RATE), pipe formatında rakip banka oranlarını
  (COMPETITOR_BANK_RTS: "42.5|43") ve strateji kolonlarını taşır.
  Bir satır = bir rezervasyon revizyonu; UNIQUE_ID satır bazında tekildir.
  Lokal geliştirmede mock veri examples/generate_myu_hist_res.py ile üretilir.
partition_column: CREATE_DT
estimated_daily_rows: 3000

columns:
  RES_ID:
    type: NUMBER(19)
    description: "Rezervasyon kimliği"
    filterable: true
    filter_role: dimension
    suggested_variable: res_id
    suggested_semantic_tag: deal_id

  TALEP_REVIZE_NO:
    type: NUMBER(4)
    description: "Talep revizyon sırası (1 = ilk giriş, 5'e kadar)"
    filterable: false

  RESERVATION_NO:
    type: NUMBER(10)
    description: "Kullanıcıya görünen rezervasyon numarası"
    filterable: false

  CREATE_DT:
    type: DATE
    description: "Rezervasyon giriş tarihi (partisyon kolonu)"
    filterable: true
    filter_role: time_axis
    suggested_variable: create_date
    suggested_semantic_tag: as_of_time

  CREATE_TM:
    type: NUMBER(6)
    description: "Giriş saati, HHMMSS tamsayı (84411 = 08:44:11)"
    filterable: false

  RESERVATION_ID_RCL:
    type: NUMBER(19)
    description: "RCL tablosundaki rezervasyon referansı (RES_ID ile aynı)"
    filterable: false
    visible_in_ui: false

  CUST_ID:
    type: NUMBER(12)
    description: "Müşteri numarası (MYU_DAILY_RES.CUST_ID ile join edilebilir)"
    filterable: false

  CURRENCY_CODE:
    type: VARCHAR2(3)
    description: "Rezervasyon para birimi"
    filterable: true
    filter_role: dimension
    suggested_variable: currencies
    suggested_semantic_tag: currency
    get_distinct: true
    distinct_values_sample: [TRY, USD, EUR]
    distinct_values_sampled_at: 2026-07-02T03:00:00Z

  CURRENTAMOUNT:
    type: NUMBER(18,2)
    description: "Müşterinin mevcut bakiyesi"
    filterable: false
    aggregatable: true

  INCOMING_AMT:
    type: NUMBER(18,2)
    description: "Gelen (yeni para) tutar"
    filterable: false
    aggregatable: true

  PORTFOLIO_AMT:
    type: NUMBER(18,2)
    description: "Müşterinin toplam portföy büyüklüğü"
    filterable: false
    aggregatable: true

  RESERVATION_AMT:
    type: NUMBER(18,2)
    description: "Rezervasyona konu tutar"
    filterable: false
    aggregatable: true

  CUST_REL:
