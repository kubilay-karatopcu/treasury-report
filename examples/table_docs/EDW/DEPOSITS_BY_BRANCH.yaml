table: DEPOSITS_BY_BRANCH
schema: EDW
description: |
  Şube bazlı aylık/çeyreklik mevduat agregasyonu. ETL ay sonu kapandığında
  güncellenir; intra-month sorgularda DEPOSITS_DAILY tercih edilir.
estimated_daily_rows: 1800000

columns:
  BRANCH_CODE:
    type: VARCHAR2(10)
    description: "Şube kodu"
    filterable: true
    filter_role: dimension
    suggested_variable: branch_codes
    suggested_semantic_tag: branch

  BRANCH_NAME:
    type: VARCHAR2(100)
    description: "Şube ismi (raporlama görünürlüğü için)"
    filterable: false

  PERIOD:
    type: VARCHAR2(20)
    description: "Çeyrek etiketi (Q1_2024, Q2_2024, ...)"
    filterable: true
    filter_role: time_axis
    suggested_variable: periods
    suggested_semantic_tag: as_of_time
    distinct_values_sample: [Q1_2024, Q2_2024, Q3_2024, Q4_2024, Q1_2025, Q2_2025, Q3_2025, Q4_2025]
    distinct_values_sampled_at: 2026-05-21T03:00:00Z

  DEPOSITS_TRY:
    type: NUMBER(18,2)
    description: "Dönem sonu mevduat (TL)"
    filterable: false
    aggregatable: true
