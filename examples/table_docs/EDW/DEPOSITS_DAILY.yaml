# Migration target #1 — used by sample blocks and Phase 6.5.b cron.
# Maps to DEV fake_db EDW.DEPOSITS_DAILY (and the real production table).
table: DEPOSITS_DAILY
schema: EDW
description: |
  Günlük mevduat bakiye snapshot'ı. ETL gün sonunda doldurur;
  T+1 09:00 itibarıyla bir önceki gün verisi mevcuttur.
partition_column: DATE
estimated_daily_rows: 12400000

columns:
  BRANCH_CODE:
    type: VARCHAR2(10)
    description: "Şube kodu"
    filterable: true
    filter_role: dimension
    suggested_variable: branch_codes
    suggested_semantic_tag: branch
    lookup:
      table: DIM_BRANCH
      key: BRANCH_CODE
      display: BRANCH_NAME

  SEGMENT:
    type: VARCHAR2(20)
    description: "Müşteri segmenti"
    filterable: true
    filter_role: dimension
    suggested_variable: segments
    suggested_semantic_tag: segment
    distinct_values_sample: [RETAIL, CORPORATE, SME]
    distinct_values_sampled_at: 2026-05-21T03:00:00Z

  DATE:
    type: DATE
    description: "Snapshot tarihi (gün sonu)"
    filterable: true
    filter_role: time_axis
    suggested_variable: as_of_date
    suggested_semantic_tag: as_of_time

  BALANCE_TRY:
    type: NUMBER(18,2)
    description: "TL eşdeğeri bakiye"
    filterable: false
    aggregatable: true

  PRODUCT_CODE:
    type: VARCHAR2(10)
    description: "Ürün kodu (TR/FX/VD/DD)"
    filterable: true
    filter_role: dimension
    suggested_variable: products
    suggested_semantic_tag: product_group
    distinct_values_sample: [TR, FX, VD, DD]
    distinct_values_sampled_at: 2026-05-21T03:00:00Z
