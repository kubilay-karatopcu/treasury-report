table: INTEREST_RATES_DAILY
schema: EDW
description: |
  Günlük TL faiz eğrisi — TCMB politika faizi, gecelik repo, swap kotasyonları.
  Likidite raporlamasının fiyatlama referansı.
partition_column: DATE

columns:
  DATE:
    type: DATE
    description: "Kotasyon tarihi"
    filterable: true
    filter_role: time_axis
    suggested_variable: as_of_date
    suggested_semantic_tag: as_of_time

  TENOR:
    type: VARCHAR2(6)
    description: "Vade etiketi"
    filterable: true
    filter_role: dimension
    suggested_variable: tenors
    suggested_semantic_tag: tenor_bucket
    distinct_values_sample: [ON, 1W, 1M, 3M, 6M, 1Y, 2Y, 5Y, 10Y]
    distinct_values_sampled_at: 2026-05-21T03:00:00Z

  INSTRUMENT:
    type: VARCHAR2(20)
    description: "Enstrüman (POLICY, OIS, IRS, REPO)"
    filterable: true
    filter_role: dimension
    suggested_variable: instruments
    suggested_semantic_tag: instrument_type

  RATE:
    type: NUMBER(8,5)
    description: "Yıllık % faiz"
    filterable: false
    aggregatable: true
