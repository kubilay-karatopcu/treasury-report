table: LOANS_DAILY
schema: EDW
description: |
  Günlük kredi portföyü snapshot'ı. Müşteri × ürün × vade dilimine göre
  bakiye, faiz, taksit. Mevduat tablolarıyla aynı tarih anahtarı.
partition_column: DATE
estimated_daily_rows: 8500000

columns:
  BRANCH_CODE:
    type: VARCHAR2(10)
    description: "Şube kodu"
    filterable: true
    filter_role: dimension
    suggested_variable: branch_codes
    suggested_semantic_tag: branch
    lookup:
      table: DIM_BRANCH
      key: BRANCH_CODE
      display: BRANCH_NAME

  PRODUCT_CODE:
    type: VARCHAR2(10)
    description: "Ürün kodu (KMH, IHT, KKB, KMS)"
    filterable: true
    filter_role: dimension
    suggested_variable: products
    suggested_semantic_tag: product_group
    distinct_values_sample: [KMH, IHT, KKB, KMS, IND]
    distinct_values_sampled_at: 2026-05-21T03:00:00Z

  SEGMENT:
    type: VARCHAR2(20)
    description: "Müşteri segmenti"
    filterable: true
    filter_role: dimension
    suggested_variable: segments
    suggested_semantic_tag: segment
    distinct_values_sample: [RETAIL, CORPORATE, SME]
    distinct_values_sampled_at: 2026-05-21T03:00:00Z

  CURRENCY:
    type: CHAR(3)
    description: "Para birimi (ISO 4217)"
    filterable: true
    filter_role: dimension
    suggested_variable: currencies
    suggested_semantic_tag: currency
    distinct_values_sample: [TRY, USD, EUR, GBP]
    distinct_values_sampled_at: 2026-05-21T03:00:00Z

  MATURITY_BUCKET:
    type: VARCHAR2(8)
    description: "Vade dilimi (1M, 3M, 6M, 1Y, 3Y, 5Y+)"
    filterable: true
    filter_role: dimension
    suggested_variable: maturities
    suggested_semantic_tag: maturity
    distinct_values_sample: [1M, 3M, 6M, 1Y, 3Y, 5Y_plus]
    distinct_values_sampled_at: 2026-05-21T03:00:00Z

  DATE:
    type: DATE
    description: "Snapshot tarihi"
    filterable: true
    filter_role: time_axis
    suggested_variable: as_of_date
    suggested_semantic_tag: as_of_time

  BALANCE_TRY:
    type: NUMBER(18,2)
    description: "TL eşdeğeri bakiye"
    filterable: false
    aggregatable: true

  INTEREST_RATE:
    type: NUMBER(6,4)
    description: "Yıllık faiz oranı"
    filterable: false
    aggregatable: true
