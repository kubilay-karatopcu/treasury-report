table: BOND_PORTFOLIO
schema: ODS_TREASURY
description: |
  Hazine masasının tahvil portföyü — TRADE_DATE bazlı pozisyon
  görüntüsü, ISIN bazında detay. Treasury bond araç envanteri.
partition_column: TRADE_DATE

columns:
  TRADE_DATE:
    type: DATE
    description: "İşlem günü"
    filterable: true
    filter_role: time_axis
    suggested_variable: trade_date
    suggested_semantic_tag: trade_time

  ISIN:
    type: CHAR(12)
    description: "ISIN kodu"
    filterable: true
    filter_role: dimension

  CCY:
    type: CHAR(3)
    description: "Para birimi"
    filterable: true
    filter_role: dimension
    suggested_variable: currencies
    suggested_semantic_tag: currency

  MATURITY:
    type: VARCHAR2(8)
    description: "Vade dilimi"
    filterable: true
    filter_role: dimension
    suggested_variable: maturities
    suggested_semantic_tag: maturity

  RATING_BUCKET:
    type: VARCHAR2(6)
    description: "Kredi notu"
    filterable: true
    filter_role: dimension
    suggested_variable: ratings
    suggested_semantic_tag: rating_bucket
    lookup:
      table: DIM_RATING
      key: RATING_BUCKET
      display: SP_LABEL

  NOMINAL:
    type: NUMBER(18,2)
    description: "Nominal değer (orijinal CCY)"
    filterable: false
    aggregatable: true

  YTM:
    type: NUMBER(8,5)
    description: "Yield to maturity"
    filterable: false
    aggregatable: true
