table: FORWARD_DEALS
schema: ODS_TREASURY
description: |
  FX forward işlem defteri — spot karşılığı + forward poin + valör.
  Hedge / pozisyon yönetiminin ham veri kaynağı.
partition_column: TRADE_DATE

columns:
  DEAL_ID:
    type: VARCHAR2(20)
    description: "Deal kimliği"
    filterable: true
    filter_role: dimension
    suggested_variable: deal_ids
    suggested_semantic_tag: deal_id

  TRADE_DATE:
    type: DATE
    description: "İşlem"
    filterable: true
    filter_role: time_axis
    suggested_variable: trade_date
    suggested_semantic_tag: trade_time

  VALUE_DATE:
    type: DATE
    description: "Valör"
    filterable: true
    filter_role: time_axis
    suggested_variable: value_date
    suggested_semantic_tag: value_time

  CCY_PAIR:
    type: CHAR(7)
    description: "Döviz çifti"
    filterable: true
    filter_role: dimension
    suggested_variable: ccy_pairs
    suggested_semantic_tag: currency

  COUNTERPARTY_ID:
    type: VARCHAR2(12)
    description: "Karşı taraf"
    filterable: true
    filter_role: dimension
    suggested_variable: counterparties
    suggested_semantic_tag: counterparty
    lookup:
      table: DIM_COUNTERPARTY
      key: COUNTERPARTY_ID
      display: COUNTERPARTY_NAME

  NOTIONAL_USD:
    type: NUMBER(18,2)
    description: "USD karşılığı tutar"
    filterable: false
    aggregatable: true

  FWD_POINTS:
    type: NUMBER(10,4)
    description: "Forward puanları"
    filterable: false
    aggregatable: true
