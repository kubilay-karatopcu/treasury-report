# Phase 7 compiler — golden snapshot fixture.
#
# Scenario: dashboard has ONE filter (currency in [USD, EUR]) and TWO
# blocks that pull from two different tables. Both tables bind to
# `currency` via `identity` transform, so the predicate is uniform.
#
# Used by concepts/tests/test_compiler.py::test_currency_in_two_tables.

filter_state:
  - concept: currency
    operator: in
    values: [USD, EUR]
    filter_id: f0

tables_in_play:
  - schema: ODS_TREASURY
    table: TRD_BRANCH_POSITION
  - schema: ODS_TREASURY
    table: FX_SWAP_DEALS

expected:
  per_table_predicates:
    - schema: ODS_TREASURY
      table: TRD_BRANCH_POSITION
      predicates:
        - filter_id: f0
          concept: currency
          blind: false
          sql: "CCY IN (:f0_currency_0, :f0_currency_1)"
          params:
            f0_currency_0: USD
            f0_currency_1: EUR
    - schema: ODS_TREASURY
      table: FX_SWAP_DEALS
      predicates:
        - filter_id: f0
          concept: currency
          blind: false
          sql: "CCY IN (:f0_currency_0, :f0_currency_1)"
          params:
            f0_currency_0: USD
            f0_currency_1: EUR
