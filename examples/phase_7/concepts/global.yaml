# Phase 7 — Concept Registry skeleton (global scope)
#
# Authoritative path in production: s3://<bucket>/concepts/global.yaml
# This file holds bank-wide concepts that every department consumes.
# System-owned: edits go through PR + review. NOT user-editable at runtime.
#
# Migration note (spec §6): this skeleton is generated by
# `concepts/migrations/0001_v0_to_v1.py` from the Phase 6.5
# SEMANTIC_TAGS_V0 allow-list. The data team then fills in
# canonical_values for the enum/bucket concepts. Time concepts need
# no canonical_values (they're parameterized by range/granularity).

version: 1
scope: global
owners:
  department: data_platform
  contact: data.platform@qnbfb.com

concepts:
  - id: currency
    name: "Para Birimi"
    type: enum
    description: |
      Para birimi (ISO 4217 canonical). FX işlemlerinde işlemin para
      birimi; pozisyon raporlarında pozisyonun para birimi. Bütün
      bankada aynı kanonik alfabe geçerli (TRY, USD, EUR, ...).
    canonical_values:
      - code: TRY
        label: "Türk Lirası"
        aliases: [TL, TRL, "Türk Lirası", "Turkish Lira"]
      - code: USD
        label: "US Doları"
        aliases: ["US Dollar", "American Dollar", "$"]
      - code: EUR
        label: "Euro"
        aliases: ["EUR Currency", "Avro"]
      - code: GBP
        label: "İngiliz Sterlini"
        aliases: ["British Pound", "Sterling", "£"]
      - code: CHF
        label: "İsviçre Frangı"
        aliases: ["Swiss Franc"]
      - code: JPY
        label: "Japon Yeni"
        aliases: ["Japanese Yen", "¥"]
    related_concepts: [counterparty, instrument_type]

  - id: as_of_time
    name: "Snapshot Zamanı"
    type: time
    description: |
      Pozisyon snapshot tarihi (gün sonu raporlama). Tipik kullanım:
      "AS_OF_DATE BETWEEN :from AND :to". Filtre uygulayan dashboard'lar
      varsayılan olarak son 30 günü ister.
    granularity_default: day

  - id: trade_time
    name: "İşlem Zamanı"
    type: time
    description: "İşlemin gerçekleştiği tarih/zaman (deal/booking)."
    granularity_default: day

  - id: value_time
    name: "Valör Zamanı"
    type: time
    description: "Valör (etkili) tarihi."
    granularity_default: day

  - id: settle_time
    name: "Takas Zamanı"
    type: time
    description: "Takasın tamamlandığı tarih."
    granularity_default: day

  - id: counterparty
    name: "Karşı Taraf"
    type: enum
    description: |
      Karşı taraf (banka, müşteri, kurum). Canonical değerler için
      ilgili dim tablosuna (DIM_COUNTERPARTY) lookup yapılır.
    # canonical_values: data team fills these in via DIM_COUNTERPARTY
    # join — too large to hand-curate.
    related_concepts: [currency, instrument_type]

  - id: user_id
    name: "Kullanıcı Kimliği"
    type: enum
    description: "Sicil veya sistem kullanıcı kimliği."

  - id: deal_id
    name: "İşlem Kimliği"
    type: enum
    description: "İşlem (deal) kimliği — eşsiz işlem referansı."

  - id: instrument_type
    name: "Enstrüman Tipi"
    type: enum
    description: "Enstrüman tipi (bond, swap, forward, vs.)."
    canonical_values:
      - { code: BOND,      label: "Bono / Tahvil" }
      - { code: SWAP,      label: "Swap" }
      - { code: FORWARD,   label: "Forward" }
      - { code: OPTION,    label: "Opsiyon" }
      - { code: REPO,      label: "Repo" }
      - { code: DEPOSIT,   label: "Mevduat" }
      - { code: LOAN,      label: "Kredi" }
