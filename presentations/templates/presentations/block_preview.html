<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ meta.title or "Blok Önizleme" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-theme-alpine.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-theme-alpine-dark.css">
  <link rel="stylesheet" href="{{ url_for('presentations.static', filename='css/editor.css') }}?v=34">
  {# Phase 11.polish — block preview shares the PRISMA dark theme so the
     iframe matches the parent Bloklar panel. `body.prisma` flips the
     editor surface tokens into dark; editor_dark.css re-tints all the
     editor.css selectors. #}
  <link rel="stylesheet" href="{{ url_for('prisma_home.static', filename='css/prisma.css') }}?v=2">
  <link rel="stylesheet" href="{{ url_for('prisma_home.static', filename='css/editor_dark.css') }}?v=1">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg-0, #0A0E1A);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--ink-soft, #C8D0DD);
      height: 100%;
      overflow: hidden;
    }
    #presentation-root {
      position: fixed;
      inset: 0;
      overflow: auto;
      padding: 16px;
      background: var(--bg-0, #0A0E1A);
      /* Phase 11.polish-final: vertically center the rendered block
         (KPI tile or chart card) inside the iframe so it doesn't hug
         the top edge with a big empty area below. */
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #presentation-root > * { width: 100%; max-width: 640px; }
  </style>
</head>
<body class="prisma atolye">
  <div
    id="presentation-root"
    data-presentation-id="{{ manifest.id }}"
    data-mode="block-preview"
  ></div>
  <script id="initial-manifest" type="application/json">{{ manifest_json | safe }}</script>
  <script src="{{ url_for('presentations.static', filename='js/bundle.js') }}?v=9"></script>
</body>
</html>
