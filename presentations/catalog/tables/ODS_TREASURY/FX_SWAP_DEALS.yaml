# Phase 7 — example of a table with TWO time concepts.
# Primary_time_concept disambiguates "last 30 days" defaults.
# Maturity uses bucket_from_range transform (column is integer days).

table: FX_SWAP_DEALS
schema: ODS_TREASURY
description: "FX swap işlem kayıtları. Real-time besleme; T+0 mevcut."

primary_time_concept: trade_time   # "last 30 days" generic filter → TRADE_DATE

columns:
  DEAL_ID:
    type: VARCHAR2(20)
    description: "İşlem (deal) kimliği"
    suggested_variable: deal_id
    suggested_semantic_tag: deal_id

  TRADE_DATE:
    type: TIMESTAMP
    description: "İşlemin booking tarih/zamanı"

  VALUE_DATE:
    type: DATE
    description: "Valör tarihi (T+2 tipik)"

  SETTLE_DATE:
    type: DATE
    description: "Takas tarihi"

  CCY:
    type: CHAR(3)
    description: "Birinci leg para birimi"

  CCY_PAIR:
    type: CHAR(7)
    description: "Para çifti (örn. USDTRY)"

  MATURITY_DAYS:
    type: NUMBER
    description: "Kalan vade (gün cinsinden, integer)"

  NOTIONAL_TRY:
    type: NUMBER
    description: "Notional TL eşdeğeri"
    aggregatable: true

concept_bindings:
  - concept: trade_time
    column: TRADE_DATE
    transform:
      kind: time_truncation     # TIMESTAMP → DATE comparison
    confidence: human_verified

  - concept: value_time
    column: VALUE_DATE
    transform:
      kind: identity
    confidence: human_verified

  - concept: settle_time
    column: SETTLE_DATE
    transform:
      kind: identity
    confidence: human_verified

  - concept: currency
    column: CCY
    transform:
      kind: identity
    confidence: human_verified

  - concept: maturity
    column: MATURITY_DAYS
    transform:
      kind: bucket_from_range   # int days → canonical maturity bucket
      ranges_concept: maturity  # references treasury.yaml::maturity.day_range
    confidence: human_verified
    verified_at: 2026-05-21T10:00:00Z
    verified_by: data.team@qnbfb.com

  - concept: deal_id
    column: DEAL_ID
    transform:
      kind: identity
    confidence: human_verified
