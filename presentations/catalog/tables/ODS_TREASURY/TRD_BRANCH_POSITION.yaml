# Phase 7 — extended table doc with concept_bindings.
#
# Schema extends Phase 6.5.b's table doc (filterable, filter_role,
# suggested_variable, suggested_semantic_tag, distinct_values_sample)
# additively with two new top-level fields:
#   - primary_time_concept   — used when a generic "last N days" filter
#                              has no explicit time-concept target.
#   - concept_bindings       — array of per-column concept bindings.
#
# Backward-compat: a Phase 6.5 reader ignores the new fields. A Phase 7
# reader uses concept_bindings for filter compilation; falls back to
# suggested_semantic_tag if the binding is missing (with concept-blind
# behaviour on the relevant filter).

table: TRD_BRANCH_POSITION
schema: ODS_TREASURY
description: |
  Şube bazlı günlük net pozisyon snapshot'ı. ETL gün sonunda
  doluyor; yeni gün verisi T+1 09:00 itibarıyla mevcut olur.
partition_column: AS_OF_DATE
estimated_daily_rows: 12000

# Phase 7 NEW — generic "last 30 days" filter targets this column.
primary_time_concept: as_of_time

columns:
  AS_OF_DATE:
    type: DATE
    description: "Snapshot tarihi (gün sonu)"
    filterable: true
    filter_role: time_axis
    suggested_variable: as_of_date
    suggested_semantic_tag: as_of_time

  BRANCH_ID:
    type: VARCHAR2(8)
    description: "Şube kodu"
    filterable: true
    filter_role: dimension
    suggested_variable: branch_id
    suggested_semantic_tag: branch
    lookup:
      table: DIM_BRANCH
      key: BRANCH_ID
      display: BRANCH_NAME

  CCY:
    type: CHAR(3)
    description: "Para birimi (ISO 4217)"
    filterable: true
    filter_role: dimension
    suggested_variable: currency_list
    suggested_semantic_tag: currency
    distinct_values_sample: [TRY, USD, EUR, GBP, CHF, JPY]
    distinct_values_sampled_at: 2026-05-19T03:00:00Z

  MATURITY_BUCKET:
    type: VARCHAR2(6)
    description: "Vade grubu"
    filterable: true
    filter_role: dimension
    suggested_variable: maturity_list
    suggested_semantic_tag: maturity
    distinct_values_sample: [ON, 1W, 1M, 3M, 6M, 1Y, 2Y, 5Y]
    distinct_values_sampled_at: 2026-05-19T03:00:00Z

  NET_POSITION:
    type: NUMBER
    description: "Net pozisyon (TL eşdeğeri, raporlama kuru)"
    filterable: false
    aggregatable: true

# ─── Phase 7 NEW: concept bindings ──────────────────────────────────
# Only `human_verified` bindings reach the compiler. Inferred bindings
# (regex / sample / llm_proposed) live here too but are gated until
# the operator approves them.
concept_bindings:
  - concept: as_of_time
    column: AS_OF_DATE
    transform:
      kind: identity
    confidence: human_verified
    verified_at: 2026-05-21T10:00:00Z
    verified_by: data.team@qnbfb.com

  - concept: currency
    column: CCY
    transform:
      kind: identity     # CCY already holds canonical ISO codes
    confidence: human_verified
    verified_at: 2026-05-21T10:00:00Z
    verified_by: data.team@qnbfb.com

  - concept: maturity
    column: MATURITY_BUCKET
    transform:
      kind: identity     # bucket strings already canonical
    confidence: human_verified
    verified_at: 2026-05-21T10:00:00Z
    verified_by: data.team@qnbfb.com

  - concept: branch
    column: BRANCH_ID
    transform:
      kind: lookup
      dim_table: DIM_BRANCH
      dim_key: BRANCH_ID
      dim_canonical: BRANCH_CODE
    confidence: human_verified
    verified_at: 2026-05-21T10:00:00Z
    verified_by: data.team@qnbfb.com
