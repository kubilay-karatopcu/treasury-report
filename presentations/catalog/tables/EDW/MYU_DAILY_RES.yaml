# Phase 7.b — concept bindings: EDW.MYU_DAILY_RES (dev mock tablosu).
#
# Filter compiler bu dokümanı okur: dashboard'daki concept filtresi bu
# tablodaki hangi kolona, hangi transform ile iner? Yalnız human_verified
# binding'ler derlenir (spec §10.4). Kolon envanteri + filter hint'leri
# dev_data/table_docs/EDW/MYU_DAILY_RES.yaml'dedir — burası sadece
# concept → kolon eşlemesi.

table: MYU_DAILY_RES
schema: EDW
primary_time_concept: as_of_time

concept_bindings:
  # Snapshot günü. CREATE_DT DATE tutar; TRUNC ile gün bazında karşılaştır.
  - concept: as_of_time
    column: CREATE_DT
    transform: { kind: time_truncation }
    confidence: human_verified
    verified_by: A16438
    verified_at: 2026-07-08T00:00:00Z

  # Para birimi zaten ISO canonical (TRY/USD/EUR) — identity.
  - concept: currency
    column: CCY_CODE
    transform: { kind: identity }
    confidence: human_verified
    verified_by: A16438
    verified_at: 2026-07-08T00:00:00Z

  # VADE etiketi (ay aralığı) → kanonik vade dilimi kovası.
  - concept: tenor_bucket
    column: VADE
    transform:
      kind: map
      pairs:
        "1-3": SHORT
        "3-6": MEDIUM
        "6-12": LONG
    confidence: human_verified
    verified_by: A16438
    verified_at: 2026-07-08T00:00:00Z

  # Müşteri tipi: G (gerçek) / T (tüzel) / K (kamu) → kanonik segment.
  - concept: segment
    column: CUST_TP
    transform:
      kind: map
      pairs:
        G: RETAIL
        T: CORP
        K: PUBLIC
    confidence: human_verified
    verified_by: A16438
    verified_at: 2026-07-08T00:00:00Z

  # Şube/organizasyon kodu. branch concept'inin canonical alfabesi yok
  # (permissive pass-through) — kod birebir filtrelenir.
  - concept: branch
    column: ENTRYUSER_ORG_CD
    transform: { kind: identity }
    confidence: human_verified
    verified_by: A16438
    verified_at: 2026-07-08T00:00:00Z
