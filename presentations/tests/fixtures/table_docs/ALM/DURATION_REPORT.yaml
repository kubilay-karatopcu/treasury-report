table: DURATION_REPORT
schema: ALM
description: |
  Aktif ve pasifin Macaulay + Modified Duration analizi. ALM
  faiz duyarlılık değerlendirmesinin temel çıktısı.
partition_column: AS_OF_DATE

columns:
  AS_OF_DATE:
    type: DATE
    description: "Rapor tarihi"
    filterable: true
    filter_role: time_axis
    suggested_variable: as_of_date
    suggested_semantic_tag: as_of_time

  CURRENCY:
    type: CHAR(3)
    description: "Para birimi"
    filterable: true
    filter_role: dimension
    suggested_variable: currencies
    suggested_semantic_tag: currency

  PORTFOLIO_SIDE:
    type: VARCHAR2(10)
    description: "ASSET veya LIABILITY"
    filterable: true
    filter_role: dimension
    suggested_variable: portfolio_sides
    suggested_semantic_tag: instrument_type
    distinct_values_sample: [ASSET, LIABILITY, EQUITY]
    distinct_values_sampled_at: 2026-05-21T03:00:00Z

  MACAULAY_DURATION:
    type: NUMBER(6,3)
    description: "Macaulay süresi (yıl)"
    filterable: false
    aggregatable: true

  MODIFIED_DURATION:
    type: NUMBER(6,3)
    description: "Modified süre"
    filterable: false
    aggregatable: true

  CONVEXITY:
    type: NUMBER(8,4)
    description: "Convexity"
    filterable: false
    aggregatable: true
