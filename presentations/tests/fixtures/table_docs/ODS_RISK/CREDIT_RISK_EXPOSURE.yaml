table: CREDIT_RISK_EXPOSURE
schema: ODS_RISK
description: |
  Kredi riski exposure — counterparty bazlı PD / LGD / EAD.
  Risk komitesinin haftalık scorecard'ı.
partition_column: AS_OF_DATE

columns:
  AS_OF_DATE:
    type: DATE
    description: "Hesaplama tarihi"
    filterable: true
    filter_role: time_axis
    suggested_variable: as_of_date
    suggested_semantic_tag: as_of_time

  COUNTERPARTY_ID:
    type: VARCHAR2(12)
    description: "Karşı taraf"
    filterable: true
    filter_role: dimension
    suggested_variable: counterparties
    suggested_semantic_tag: counterparty
    lookup:
      table: DIM_COUNTERPARTY
      key: COUNTERPARTY_ID
      display: COUNTERPARTY_NAME

  RATING_BUCKET:
    type: VARCHAR2(6)
    description: "İç kredi notu"
    filterable: true
    filter_role: dimension
    suggested_variable: ratings
    suggested_semantic_tag: rating_bucket
    lookup:
      table: DIM_RATING
      key: RATING_BUCKET
      display: SP_LABEL

  CURRENCY:
    type: CHAR(3)
    description: "Para birimi"
    filterable: true
    filter_role: dimension
    suggested_variable: currencies
    suggested_semantic_tag: currency

  EAD:
    type: NUMBER(18,2)
    description: "Exposure at Default (TL)"
    filterable: false
    aggregatable: true

  PD:
    type: NUMBER(6,4)
    description: "Probability of Default"
    filterable: false
    aggregatable: true

  LGD:
    type: NUMBER(5,4)
    description: "Loss Given Default"
    filterable: false
    aggregatable: true
