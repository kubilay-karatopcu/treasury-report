table: OPERATIONAL_LOSSES
schema: ODS_RISK
description: |
  Operasyonel kayıp kayıtları — olay tipi, neden, tahsil edilebilirlik.
  BASEL Op-Risk raporlamasının olay defteri.

columns:
  EVENT_DATE:
    type: DATE
    description: "Kayıp olay tarihi"
    filterable: true
    filter_role: time_axis
    suggested_variable: event_date
    suggested_semantic_tag: as_of_time

  EVENT_TYPE:
    type: VARCHAR2(40)
    description: "BASEL kayıp kategorisi"
    filterable: true
    filter_role: dimension
    suggested_variable: event_types
    suggested_semantic_tag: instrument_type
    distinct_values_sample: [INTERNAL_FRAUD, EXTERNAL_FRAUD, EXECUTION, CLIENTS_PRODUCTS, DAMAGE, BUSINESS_DISRUPTION]
    distinct_values_sampled_at: 2026-05-21T03:00:00Z

  BRANCH_CODE:
    type: VARCHAR2(10)
    description: "Olayın geçtiği şube"
    filterable: true
    filter_role: dimension
    suggested_variable: branch_codes
    suggested_semantic_tag: branch
    lookup:
      table: DIM_BRANCH
      key: BRANCH_CODE
      display: BRANCH_NAME

  GROSS_LOSS:
    type: NUMBER(18,2)
    description: "Brüt kayıp (TL)"
    filterable: false
    aggregatable: true

  RECOVERED:
    type: NUMBER(18,2)
    description: "Tahsil edilen tutar"
    filterable: false
    aggregatable: true
