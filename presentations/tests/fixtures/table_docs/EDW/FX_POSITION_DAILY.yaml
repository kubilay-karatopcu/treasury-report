table: FX_POSITION_DAILY
schema: EDW
description: |
  Günlük FX net pozisyonu — para birimi × counterparty × vade.
  Hazine masasının açık döviz pozisyonunu izleyen ana tablo.
partition_column: TRADE_DATE
estimated_daily_rows: 320000

columns:
  TRADE_DATE:
    type: DATE
    description: "İşlem tarihi"
    filterable: true
    filter_role: time_axis
    suggested_variable: trade_date
    suggested_semantic_tag: trade_time

  VALUE_DATE:
    type: DATE
    description: "Valör tarihi"
    filterable: true
    filter_role: time_axis
    suggested_variable: value_date
    suggested_semantic_tag: value_time

  CCY:
    type: CHAR(3)
    description: "Para birimi"
    filterable: true
    filter_role: dimension
    suggested_variable: currencies
    suggested_semantic_tag: currency
    distinct_values_sample: [TRY, USD, EUR, GBP, CHF, JPY, AUD]
    distinct_values_sampled_at: 2026-05-21T03:00:00Z

  COUNTERPARTY_ID:
    type: VARCHAR2(12)
    description: "Karşı taraf banka kimliği"
    filterable: true
    filter_role: dimension
    suggested_variable: counterparties
    suggested_semantic_tag: counterparty
    lookup:
      table: DIM_COUNTERPARTY
      key: COUNTERPARTY_ID
      display: COUNTERPARTY_NAME

  MATURITY:
    type: VARCHAR2(8)
    description: "Vade dilimi"
    filterable: true
    filter_role: dimension
    suggested_variable: maturities
    suggested_semantic_tag: maturity

  NET_POSITION_USD:
    type: NUMBER(18,2)
    description: "Net pozisyon (USD karşılığı)"
    filterable: false
    aggregatable: true
