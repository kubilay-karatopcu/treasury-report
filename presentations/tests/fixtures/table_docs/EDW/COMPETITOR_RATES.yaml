table: COMPETITOR_RATES
schema: EDW
description: |
  Rakip banka mevduat oranları — web scraping + manuel girişle güncellenir.
  Saatlik snapshot (BANK_NAME, VADE, TUTAR_RANGE) anahtarı; rakip analizi
  raporlarının kaynağı.
partition_column: DATE
estimated_daily_rows: 42000

columns:
  BANK_NAME:
    type: VARCHAR2(50)
    description: "Rakip banka adı"
    filterable: true
    filter_role: dimension
    suggested_variable: banks
    suggested_semantic_tag: counterparty
    distinct_values_sample: [GARANTI, AKBANK, ISBANK, YAPIKREDI, ZIRAAT, VAKIF, HALKBANK]
    distinct_values_sampled_at: 2026-05-21T03:00:00Z

  VADE:
    type: VARCHAR2(10)
    description: "Vade etiketi (1M, 3M, 6M, 1Y, 2Y)"
    filterable: true
    filter_role: dimension
    suggested_variable: maturities
    suggested_semantic_tag: maturity
    distinct_values_sample: [1M, 3M, 6M, 1Y, 2Y]
    distinct_values_sampled_at: 2026-05-21T03:00:00Z

  TUTAR_RANGE:
    type: VARCHAR2(50)
    description: "Bakiye dilimi (50K-100K, 100K-250K, vs.)"
    filterable: true
    filter_role: dimension
    suggested_variable: tutar_ranges
    suggested_semantic_tag: other
    distinct_values_sample:
      - 0-50K
      - 50K-100K
      - 100K-250K
      - 250K-1M
      - 1M+
    distinct_values_sampled_at: 2026-05-21T03:00:00Z

  RATE:
    type: NUMBER(6,4)
    description: "Yıllık faiz oranı (yüzde)"
    filterable: false
    aggregatable: true

  DATE:
    type: DATE
    description: "Snapshot tarihi"
    filterable: true
    filter_role: time_axis
    suggested_variable: as_of_date
    suggested_semantic_tag: as_of_time
