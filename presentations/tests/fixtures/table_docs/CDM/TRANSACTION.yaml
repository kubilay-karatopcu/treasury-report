table: TRANSACTION
schema: CDM
description: |
  Tüm hesap hareketleri — para giriş/çıkış, kanal, valör. Operasyon
  raporlamasının atomik olay tablosu.
partition_column: TRANSACTION_DATE
estimated_daily_rows: 14000000

columns:
  TRANSACTION_DATE:
    type: DATE
    description: "İşlem tarihi"
    filterable: true
    filter_role: time_axis
    suggested_variable: trade_date
    suggested_semantic_tag: trade_time

  VALUE_DATE:
    type: DATE
    description: "Valör tarihi"
    filterable: true
    filter_role: time_axis
    suggested_variable: value_date
    suggested_semantic_tag: value_time

  ACCOUNT_ID:
    type: VARCHAR2(24)
    description: "Hesap"
    filterable: true
    filter_role: dimension
    lookup:
      table: ACCOUNT
      key: ACCOUNT_ID
      display: PRODUCT_CODE

  AMOUNT:
    type: NUMBER(18,2)
    description: "Tutar (orijinal para)"
    filterable: false
    aggregatable: true

  CURRENCY:
    type: CHAR(3)
    description: "Para birimi"
    filterable: true
    filter_role: dimension
    suggested_variable: currencies
    suggested_semantic_tag: currency

  CHANNEL:
    type: VARCHAR2(20)
    description: "Kanal (SUBE, ATM, INTERNET, MOBIL, EFT, SWIFT)"
    filterable: true
    filter_role: dimension
    suggested_variable: channels
    suggested_semantic_tag: instrument_type
    distinct_values_sample: [SUBE, ATM, INTERNET, MOBIL, EFT, SWIFT, KART]
    distinct_values_sampled_at: 2026-05-21T03:00:00Z
