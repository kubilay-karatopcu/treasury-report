table: ACCOUNT
schema: CDM
description: |
  Hesap ana sayfası — müşterinin altındaki tüm hesaplar (mevduat, kredi,
  yatırım). Para birimi + ürün kategorisiyle indekslenmiş.

columns:
  ACCOUNT_ID:
    type: VARCHAR2(24)
    description: "Hesap kimliği"
    filterable: true
    filter_role: dimension

  CUSTOMER_ID:
    type: VARCHAR2(20)
    description: "Sahip müşteri"
    filterable: true
    filter_role: dimension
    lookup:
      table: CUSTOMER
      key: CUSTOMER_ID
      display: SEGMENT

  CURRENCY:
    type: CHAR(3)
    description: "Para birimi"
    filterable: true
    filter_role: dimension
    suggested_variable: currencies
    suggested_semantic_tag: currency
    lookup:
      table: DIM_CURRENCY
      key: CCY_CODE
      display: CCY_NAME

  PRODUCT_CODE:
    type: VARCHAR2(10)
    description: "Ürün"
    filterable: true
    filter_role: dimension
    suggested_variable: products
    suggested_semantic_tag: product_group
    lookup:
      table: DIM_PRODUCT
      key: PRODUCT_CODE
      display: PRODUCT_NAME

  BRANCH_CODE:
    type: VARCHAR2(10)
    description: "Açıldığı şube"
    filterable: true
    filter_role: dimension
    suggested_variable: branch_codes
    suggested_semantic_tag: branch
    lookup:
      table: DIM_BRANCH
      key: BRANCH_CODE
      display: BRANCH_NAME

  OPENED_AT:
    type: DATE
    description: "Hesap açılış tarihi"
    filterable: true
    filter_role: time_axis
    suggested_variable: opened_at
    suggested_semantic_tag: as_of_time
