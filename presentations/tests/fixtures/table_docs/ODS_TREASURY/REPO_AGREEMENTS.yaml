table: REPO_AGREEMENTS
schema: ODS_TREASURY
description: |
  Repo ve ters repo anlaşmaları — kısa vadeli likidite yönetiminin
  ana enstrümanı. Counterparty + vade + faiz görüntülenir.
partition_column: TRADE_DATE

columns:
  DEAL_ID:
    type: VARCHAR2(20)
    description: "Deal kimliği"
    filterable: true
    filter_role: dimension
    suggested_variable: deal_ids
    suggested_semantic_tag: deal_id

  TRADE_DATE:
    type: DATE
    description: "İşlem tarihi"
    filterable: true
    filter_role: time_axis
    suggested_variable: trade_date
    suggested_semantic_tag: trade_time

  SETTLE_DATE:
    type: DATE
    description: "Takas tarihi"
    filterable: true
    filter_role: time_axis
    suggested_variable: settle_date
    suggested_semantic_tag: settle_time

  COUNTERPARTY_ID:
    type: VARCHAR2(12)
    description: "Karşı taraf"
    filterable: true
    filter_role: dimension
    suggested_variable: counterparties
    suggested_semantic_tag: counterparty
    lookup:
      table: DIM_COUNTERPARTY
      key: COUNTERPARTY_ID
      display: COUNTERPARTY_NAME

  DIRECTION:
    type: VARCHAR2(8)
    description: "REPO veya REVERSE"
    filterable: true
    filter_role: dimension
    suggested_variable: directions
    suggested_semantic_tag: instrument_type
    distinct_values_sample: [REPO, REVERSE]
    distinct_values_sampled_at: 2026-05-21T03:00:00Z

  CCY:
    type: CHAR(3)
    description: "Para birimi"
    filterable: true
    filter_role: dimension
    suggested_variable: currencies
    suggested_semantic_tag: currency

  TENOR:
    type: VARCHAR2(6)
    description: "Vade etiketi"
    filterable: true
    filter_role: dimension
    suggested_variable: tenors
    suggested_semantic_tag: tenor_bucket

  NOTIONAL:
    type: NUMBER(18,2)
    description: "Notional tutar"
    filterable: false
    aggregatable: true

  RATE:
    type: NUMBER(8,5)
    description: "Repo faizi (yıllık)"
    filterable: false
    aggregatable: true
